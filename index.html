<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Lock screen ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #ffffff;
    }

    .lock-wrap {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: #888;
      font-size: 20px;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 0.4rem;
      color: #1a1a1a;
    }

    .sub {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    label {
      font-size: 13px;
      color: #888;
      display: block;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 1rem;
    }

    .input-wrap input {
      width: 100%;
      padding: 0 40px 0 12px;
      height: 40px;
      font-size: 15px;
      letter-spacing: 0.1em;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #f9f9f9;
      color: #1a1a1a;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .input-wrap input:focus {
      border-color: #aaa;
      background: #ffffff;
    }

    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #bbb;
      font-size: 17px;
      padding: 2px;
      display: flex;
      align-items: center;
    }

    .toggle-btn:hover { color: #888; }

    .enter-btn {
      width: 100%;
      height: 40px;
      background: #1a1a1a;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .enter-btn:hover { opacity: 0.85; }
    .enter-btn:active { opacity: 0.7; }

    .error-msg {
      font-size: 12px;
      color: #cc3333;
      margin-top: 8px;
      min-height: 16px;
      text-align: center;
    }

    /* ── Inner / placeholder screen ── */
    .inner-page {
      min-height: 100vh;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #ffffff;
    }

    .inner-card {
      text-align: center;
      max-width: 480px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f2f2f2;
      border: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 28px;
      color: #aaa;
    }

    .inner-card h2 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #1a1a1a;
    }

    .inner-card p {
      font-size: 15px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .tag {
      font-size: 12px;
      background: #f2f2f2;
      color: #888;
      border: 1px solid #e8e8e8;
      border-radius: 99px;
      padding: 4px 12px;
    }

    .logout-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-family: inherit;
      color: #888;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .logout-btn:hover { background: #f9f9f9; }
  </style>
</head>
<body>

  <!-- Lock screen -->
  <div class="page" id="lock-screen">
    <div class="lock-wrap"><i class="ti ti-lock"></i></div>
    <h1>Welcome</h1>
    <p class="sub">This page is private.<br>Enter the passcode to continue.</p>
    <div class="card">
      <label for="passcode">Passcode</label>
      <div class="input-wrap">
        <input type="password" id="passcode" placeholder="••••••••" autocomplete="off" />
        <button class="toggle-btn" id="toggle-vis" aria-label="Show passcode" tabindex="-1">
          <i class="ti ti-eye"></i>
        </button>
      </div>
      <button class="enter-btn" id="enter-btn">Enter</button>
      <p class="error-msg" id="error-msg" aria-live="polite"></p>
    </div>
  </div>

  <!-- Placeholder inner page -->
  <div class="inner-page" id="inner-screen">
    <div class="inner-card">
      <div class="avatar"><i class="ti ti-user"></i></div>
      <!-- ✏️ Replace "Your name here" with your name -->
      <h2>Your name here</h2>
      <!-- ✏️ Replace this paragraph with a short bio -->
      <p>Designer, art director, or whatever you'd like to say about yourself. This is the first thing people see after unlocking — keep it short and true.</p>
      <div class="tag-row">
        <!-- ✏️ Edit or add tags to match your disciplines -->
        <span class="tag">Brand identity</span>
        <span class="tag">Art direction</span>
        <span class="tag">Typography</span>
      </div>
      <button class="logout-btn" id="logout-btn">
        <i class="ti ti-lock"></i> Lock
      </button>
    </div>
  </div>

  <script>
    // ✏️ Change this to your actual passcode
    const PASSCODE = "Mandr8kemech";

    const input      = document.getElementById("passcode");
    const enterBtn   = document.getElementById("enter-btn");
    const errorMsg   = document.getElementById("error-msg");
    const toggleBtn  = document.getElementById("toggle-vis");
    const lockScreen = document.getElementById("lock-screen");
    const innerScreen = document.getElementById("inner-screen");
    const logoutBtn  = document.getElementById("logout-btn");

    function tryEnter() {
      if (input.value === PASSCODE) {
        lockScreen.style.display = "none";
        innerScreen.style.display = "flex";
        errorMsg.textContent = "";
      } else {
        errorMsg.textContent = "Incorrect passcode. Try again.";
        input.value = "";
        input.focus();
      }
    }

    enterBtn.addEventListener("click", tryEnter);
    input.addEventListener("keydown", e => { if (e.key === "Enter") tryEnter(); });

    toggleBtn.addEventListener("click", () => {
      const isHidden = input.type === "password";
      input.type = isHidden ? "text" : "password";
      toggleBtn.querySelector("i").className = isHidden ? "ti ti-eye-off" : "ti ti-eye";
      toggleBtn.setAttribute("aria-label", isHidden ? "Hide passcode" : "Show passcode");
    });

    logoutBtn.addEventListener("click", () => {
      innerScreen.style.display = "none";
      lockScreen.style.display = "flex";
      input.value = "";
    });
  </script>

</body>
</html>
